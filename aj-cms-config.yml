backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://aj-interiors.netlify.app
display_url: https://aj-interiors.netlify.app

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string", default: "AJ Interiors" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Your Dream Interior Starts Here." }
          - { label: "Phone Number", name: "phone", widget: "string", default: "+91 98765 43210" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string", default: "+91 98765 43210" }
          - { label: "Email Address", name: "email", widget: "string", default: "hello@ajinteriors.in" }
          - { label: "Studio Address", name: "address", widget: "string", default: "Banjara Hills, Hyderabad" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Established Year", name: "est_year", widget: "string", default: "2019" }
          - { label: "City", name: "city", widget: "string", default: "Hyderabad" }

      - name: "hero"
        label: "Hero Section"
        file: "_data/hero.json"
        fields:
          - { label: "Badge Text", name: "badge", widget: "string", default: "Now Accepting Projects — Hyderabad" }
          - { label: "Headline Line 1", name: "line1", widget: "string", default: "Your Dream" }
          - { label: "Headline Line 2 (Orange)", name: "line2", widget: "string", default: "Interior" }
          - { label: "Headline Line 3 (Italic)", name: "line3", widget: "string", default: "Starts Here." }
          - { label: "Sub Description", name: "description", widget: "text", default: "We design spaces that energise you." }
          - { label: "Stat 1 Number", name: "stat1_num", widget: "string", default: "120" }
          - { label: "Stat 1 Label", name: "stat1_label", widget: "string", default: "Projects Done" }
          - { label: "Stat 2 Number", name: "stat2_num", widget: "string", default: "6" }
          - { label: "Stat 2 Label", name: "stat2_label", widget: "string", default: "Years Exp." }
          - { label: "Stat 3 Number", name: "stat3_num", widget: "string", default: "98" }
          - { label: "Stat 3 Label", name: "stat3_label", widget: "string", default: "Happy Clients" }

      - name: "about"
        label: "About Section"
        file: "_data/about.json"
        fields:
          - { label: "Section Title", name: "title", widget: "string", default: "Designing Spaces That Tell Your Story" }
          - { label: "Paragraph 1", name: "para1", widget: "text" }
          - { label: "Paragraph 2", name: "para2", widget: "text" }
          - { label: "Founder Name", name: "founder_name", widget: "string", default: "AJ Studios" }
          - { label: "Founder Role", name: "founder_role", widget: "string", default: "Principal Designer & Founder" }

      - name: "testimonial"
        label: "Testimonial"
        file: "_data/testimonial.json"
        fields:
          - { label: "Quote", name: "quote", widget: "text" }
          - { label: "Client Name & Location", name: "author", widget: "string" }

  - name: "projects"
    label: "Portfolio Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Residential", "Commercial", "Hospitality", "Office", "Retail"] }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Project Photo", name: "photo", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
