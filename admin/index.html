<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJ Interiors — Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0D0D0D;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
    .b1{width:500px;height:500px;background:rgba(255,92,0,.1);top:-100px;right:-100px}
    .b2{width:400px;height:400px;background:rgba(0,194,179,.07);bottom:-80px;left:-80px}
    .card{position:relative;z-index:10;width:420px;max-width:90vw;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:48px 44px;text-align:center}
    .logo{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#FAFAF8;letter-spacing:-.02em;margin-bottom:6px}
    .logo span{color:#FF5C00}
    .tagline{font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:40px}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
    .divider span{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.2)}
    .login-btn{width:100%;background:linear-gradient(135deg,#FF5C00,#FF2D6B);border:none;border-radius:100px;color:#fff;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:16px 32px;cursor:pointer;transition:opacity .3s,transform .2s;display:flex;align-items:center;justify-content:center;gap:10px}
    .login-btn:hover{opacity:.9;transform:translateY(-1px)}
    .back-link{display:inline-flex;align-items:center;gap:6px;margin-top:24px;font-size:.72rem;color:rgba(255,255,255,.25);text-decoration:none;transition:color .3s}
    .back-link:hover{color:rgba(255,255,255,.5)}
    .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,194,179,.12);border:1px solid rgba(0,194,179,.2);border-radius:100px;padding:6px 14px;font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#00C2B3;margin-bottom:28px}
    .badge .dot{width:6px;height:6px;border-radius:50%;background:#00C2B3;animation:blink 1.5s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    /* Hide netlify CMS default UI completely on this page */
    #nc-root{display:none!important}
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="card">
    <div class="logo">AJ<span>.</span>Interiors</div>
    <div class="tagline">Admin Dashboard</div>
    <div class="badge"><span class="dot"></span>Secure Access Only</div>
    <div class="divider"><span>Sign in to continue</span></div>
    <button class="login-btn" onclick="netlifyIdentity.open('login')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Login to Admin Panel
    </button>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Go back to website
    </a>
  </div>
  <script>
    if(window.netlifyIdentity){
      netlifyIdentity.on('init', user => {
        if(user) window.location.href = '/admin/#/';
      });
      netlifyIdentity.on('login', () => {
        window.location.href = '/admin/#/';
      });
    }
  </script>
</body>
</html>
