backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://aj-interiors.netlify.app
display_url: https://aj-interiors.netlify.app

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Studio Address", name: "address", widget: "string" }

  - name: "projects"
    label: "Portfolio Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Residential", "Commercial", "Hospitality"] }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Project Photo", name: "photo", widget: "image", required: false }
